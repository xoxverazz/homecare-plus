version: '3.9'

services:
  # ── MySQL Database ────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: homecare_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-homecare123}
      MYSQL_DATABASE: homecare_plus
      MYSQL_USER: homecare
      MYSQL_PASSWORD: ${DB_PASSWORD:-homecare123}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ───────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: homecare_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: homecare
      DB_PASSWORD: ${DB_PASSWORD:-homecare123}
      DB_NAME: homecare_plus
      SECRET_KEY: ${SECRET_KEY:-change-this-secret-key-in-production}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
    ports:
      - "8000:8000"
    volumes:
      - uploads_data:/app/uploads
    command: >
      sh -c "python seed_db.py && uvicorn main:app --host 0.0.0.0 --port 8000"

  # ── React Frontend ────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: homecare_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"
    environment:
      VITE_API_URL: http://localhost:8000/api

volumes:
  mysql_data:
  uploads_data:
